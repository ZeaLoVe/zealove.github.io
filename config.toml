baseURL = 'https://zealove.github.io/'
# languageCode = 'en-us'
title = "ZeaLoVe's Blogs"
theme = "ananke"
publishDir = "./public"
DefaultContentLanguage = "zh"

[languages]
  [languages.zh]
    title = "ZeaLoVe's Blogs"
    weight = 1
    contentDir = "content/cn"
  [languages.en]
    title = "ZeaLoVe's Blogs"
    weight = 2
    contentDir = "content/en"

[taxonomies]
  tag = "tags"
  category = "categories"

[menu]
  [[menu.main]]
    name = "博客"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "Games"
    url = "/games/"
    weight = 2
  [[menu.main]]
    name = "我的收藏"
    url = "/favorites/"
    weight = 3
  [[menu.main]]
    name = "每日图像"
    url = "/daily-image/"
    weight = 4

[params]
  description = "ZeaLoVe's personal blog - sharing thoughts on Cloud Native, Database, Go, and more."
  custom_css = ["ananke/css/fixes.css", "ananke/css/highlighting.css"]
  text_color = ""
  author = ""
  favicon = ""
  site_logo = ""
  # choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
  background_color_class = "bg-black"
  recent_posts_number = 3
  featured_image = "/images/tasada.jpg"
  # Social meta (SEO)
  twitter_card = "summary_large_image"
  # og_image defaults to featured_image if not set per-page

[[params.ananke_socials]]
name = "twitter"
url = "https://twitter.com/ZeaLoVe16"

[[params.ananke_socials]]
name = "github"
url = "https://github.com/ZeaLoVe"

