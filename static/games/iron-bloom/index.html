<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Iron Bloom - 滑动屏幕划线撞击铁球，让它在空中绽放成绚丽的铁花" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Iron Bloom - 滑动铁花游戏</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a0a0a;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      
      canvas {
        display: block;
      }
      
      #app {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="main-wrapper">
        <div class="content-container">
          <img
            src="https://lf-coze-web-cdn.coze.cn/obj/eden-cn/lm-lgvj/ljhwZthlaukjlkulzlp/coze-coding/icon/coze-coding.gif"
            alt="扣子编程 Logo"
            class="logo-image"
          />
          <div>
            <div class="text-container">
              <h1 class="heading">
                Iron Bloom
              </h1>
              <p class="description">
                点击飞溅的铁球，让它在空中绽放成绚丽的铁花
              </p>
            </div>
          </div>
        </div>
      </main>
    </div>
    
    <!-- 游戏脚本 -->
    <script src="./js/IronBall.js"></script>
    <script src="./js/IronBallManager.js"></script>
    <script src="./js/FlowerEffect.js"></script>
    <script src="./js/ScoreSystem.js"></script>
    <script src="./js/ComboSystem.js"></script>
    <script src="./js/UIManager.js"></script>
    <script src="./js/AudioManager.js"></script>
    <script src="./js/GameManager.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
