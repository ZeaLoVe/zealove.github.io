<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <defs>
    <!-- Fruit-themed gradient: pink to orange to purple -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="45%" style="stop-color:#FF8C42"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
    <!-- Subtle shine overlay -->
    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:white;stop-opacity:0"/>
    </radialGradient>
    <!-- Card shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <!-- Card gradient (warm white) -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFDE7"/>
      <stop offset="100%" style="stop-color:#FFF8E1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="320" height="180" fill="url(#bg)"/>
  <rect width="320" height="180" fill="url(#shine)"/>

  <!-- ===== Bottom Layer (offset -10, -8) ===== -->
  <g opacity="0.35">
    <!-- Row 0 -->
    <rect x="16" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="37" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="58" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="79" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="100" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="121" y="17" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 1 -->
    <rect x="16" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="37" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="58" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="79" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="100" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="121" y="44" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 2 -->
    <rect x="16" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="37" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="58" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="79" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="100" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="121" y="71" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 3 -->
    <rect x="16" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="37" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="58" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="79" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="100" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="121" y="98" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
  </g>

  <!-- ===== Middle Layer (offset -5, -4) ===== -->
  <g opacity="0.6">
    <!-- Row 0 -->
    <rect x="21" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="42" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="63" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="84" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="105" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="126" y="21" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 1 -->
    <rect x="21" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="42" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="63" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="84" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="105" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="126" y="48" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 2 -->
    <rect x="21" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="42" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="63" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="84" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="105" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="126" y="75" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 3 -->
    <rect x="21" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="42" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="63" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="84" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="105" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="126" y="102" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
  </g>

  <!-- ===== Top Layer (full 6x4 grid) ===== -->
  <g filter="url(#shadow)">
    <!-- Row 0 -->
    <rect x="26" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="47" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="68" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="89" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="110" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="131" y="25" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 1 -->
    <rect x="26" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="47" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="68" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="89" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="110" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="131" y="52" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 2 -->
    <rect x="26" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="47" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="68" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="89" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="110" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="131" y="79" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <!-- Row 3 -->
    <rect x="26" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="47" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="68" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="89" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="110" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
    <rect x="131" y="106" width="19" height="26" rx="2.5" fill="url(#cardGrad)"/>
  </g>

  <!-- ===== Top Layer Fruits (emoji) ===== -->
  <g font-size="11" text-anchor="middle">
    <!-- Row 0 -->
    <text x="35.5" y="43">🍎</text>
    <text x="56.5" y="43">🍌</text>
    <text x="77.5" y="43">🍇</text>
    <text x="98.5" y="43">🍓</text>
    <text x="119.5" y="43">🍊</text>
    <text x="140.5" y="43">🍉</text>
    <!-- Row 1 -->
    <text x="35.5" y="70">🍍</text>
    <text x="56.5" y="70">🍑</text>
    <text x="77.5" y="70">🍎</text>
    <text x="98.5" y="70">🍌</text>
    <text x="119.5" y="70">🍇</text>
    <text x="140.5" y="70">🍓</text>
    <!-- Row 2 -->
    <text x="35.5" y="97">🍊</text>
    <text x="56.5" y="97">🍉</text>
    <text x="77.5" y="97">🍍</text>
    <text x="98.5" y="97">🍑</text>
    <text x="119.5" y="97">🍎</text>
    <text x="140.5" y="97">🍌</text>
    <!-- Row 3 -->
    <text x="35.5" y="124">🍇</text>
    <text x="56.5" y="124">🍓</text>
    <text x="77.5" y="124">🍊</text>
    <text x="98.5" y="124">🍉</text>
    <text x="119.5" y="124">🍍</text>
    <text x="140.5" y="124">🍑</text>
  </g>

  <!-- ===== 5 Slots below cards ===== -->
  <!-- Slot container -->
  <rect x="25" y="138" width="148" height="36" rx="6" fill="rgba(255,255,255,0.12)"/>
  <!-- Slot 1 - filled 🍎 -->
  <rect x="30" y="143" width="23" height="28" rx="3" fill="rgba(255,255,255,0.3)"/>
  <text x="41.5" y="161" font-size="12" text-anchor="middle">🍎</text>
  <!-- Slot 2 - filled 🍌 -->
  <rect x="55" y="143" width="23" height="28" rx="3" fill="rgba(255,255,255,0.3)"/>
  <text x="66.5" y="161" font-size="12" text-anchor="middle">🍌</text>
  <!-- Slot 3 - filled 🍇 (3 of a kind about to clear!) -->
  <rect x="80" y="143" width="23" height="28" rx="3" fill="rgba(255,255,255,0.3)"/>
  <text x="91.5" y="161" font-size="12" text-anchor="middle">🍇</text>
  <!-- Slot 4 - empty -->
  <rect x="105" y="143" width="23" height="28" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Slot 5 - empty -->
  <rect x="130" y="143" width="23" height="28" rx="3" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Match hint ring around slot 3 (🍇 about to match 3!) -->
  <rect x="78" y="141" width="27" height="32" rx="5" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.9"/>

  <!-- ===== Score Panel (right side) ===== -->
  <rect x="193" y="20" width="110" height="154" rx="9" fill="rgba(255,255,255,0.1)"/>

  <!-- Score title -->
  <text x="248" y="41" font-size="9" fill="rgba(255,255,255,0.65)" text-anchor="middle" letter-spacing="1">SCORE</text>
  <!-- Score value -->
  <text x="248" y="67" font-size="22" font-weight="bold" fill="white" text-anchor="middle">4200</text>

  <!-- Divider -->
  <line x1="203" y1="77" x2="293" y2="77" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Combo row -->
  <text x="203" y="95" font-size="9" fill="rgba(255,255,255,0.6)">🔥 COMBO</text>
  <text x="293" y="95" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">x3</text>

  <!-- Match row -->
  <text x="203" y="113" font-size="9" fill="rgba(255,255,255,0.6)">⭐ MATCH</text>
  <text x="293" y="113" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">3</text>

  <!-- Time row -->
  <text x="203" y="131" font-size="9" fill="rgba(255,255,255,0.6)">⏱ TIME</text>
  <text x="293" y="131" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">1:48</text>

  <!-- Cards left row -->
  <text x="203" y="149" font-size="9" fill="rgba(255,255,255,0.6)">📦 LEFT</text>
  <text x="293" y="149" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="end">48</text>

  <!-- Decorative fruit icons in score panel footer -->
  <text x="215" y="167" font-size="10" opacity="0.5">🍎</text>
  <text x="232" y="167" font-size="10" opacity="0.5">🍌</text>
  <text x="249" y="167" font-size="10" opacity="0.5">🍇</text>
  <text x="266" y="167" font-size="10" opacity="0.5">🍓</text>
  <text x="283" y="167" font-size="10" opacity="0.5">🍊</text>
</svg>
