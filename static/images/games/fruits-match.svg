  <!-- Grid pattern to represent card grid -->
  <rect x="15" y="25" width="18" height="24" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <rect x="36" y="25" width="18" height="24" rx="3" fill="#ffd93d" opacity="0.9"/>
  <rect x="57" y="25" width="18" height="24" rx="3" fill="#4ecdc4" opacity="0.9"/>
  <rect x="78" y="25" width="18" height="24" rx="3" fill="#a8e6cf" opacity="0.9"/>
  <rect x="15" y="52" width="18" height="24" rx="3" fill="#ffd93d" opacity="0.9"/>
  <rect x="36" y="52" width="18" height="24" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <rect x="57" y="52" width="18" height="24" rx="3" fill="#a8e6cf" opacity="0.9"/>
  <rect x="78" y="52" width="18" height="24" rx="3" fill="#4ecdc4" opacity="0.9"/>
  <rect x="15" y="79" width="18" height="24" rx="3" fill="#4ecdc4" opacity="0.9"/>
  <rect x="36" y="79" width="18" height="24" rx="3" fill="#a8e6cf" opacity="0.9"/>
  <rect x="57" y="79" width="18" height="24" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <rect x="78" y="79" width="18" height="24" rx="3" fill="#ffd93d" opacity="0.9"/>
  <!-- Highlight on first card -->
  <rect x="15" y="25" width="18" height="24" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
