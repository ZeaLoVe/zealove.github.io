{{/*
  单个收藏卡片
  数据通过 .item 传入
*/}}
{{ $item := .item }}
<div class="favorite-card relative w-100 w-50-m w-33-l pa3">
  <a href="{{ $item.url }}" target="_blank" rel="noopener noreferrer" 
     class="db link dim relative overflow-hidden br2 shadow-4" 
     style="background: #1a1a2e; min-height: 180px; text-decoration: none; transition: transform 0.2s ease;">
    {{/* 缩略图区域 */}}
    <div class="favorite-card-image w-100 flex items-center justify-center" style="height: 100px; background: #16213e;">
      <img src="{{ $item.favicon }}" alt="{{ $item.name }}" 
           class="db" style="width: 48px; height: 48px; object-fit: contain;"
           onerror="this.style.display='none'">
    </div>

    {{/* 工具信息 */}}
    <div class="pa3">
      <h3 class="f5 fw6 white mb1" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ $item.name }}</h3>
      <p class="f6 white-70 mb0" style="opacity: 0.7; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 2.8em;">
        {{ $item.description }}
      </p>
    </div>
  </a>
</div>
