name: GitHub Pages

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Detect static-only changes
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -v '^static/' | grep -v '^public/')
          if [ -z "$CHANGED" ]; then
            echo "Only static/ changed, skipping Hugo build"
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "Changes detected: $CHANGED"
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.changed.outputs.skip_build != 'true'
        run: hugo --gc --minify

      - name: Upload Pages artifact
        if: steps.changed.outputs.skip_build != 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        if: steps.changed.outputs.skip_build != 'true'
        uses: actions/deploy-pages@v4
